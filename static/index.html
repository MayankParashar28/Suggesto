<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggesto — Discover Your Next Movie Sketch</title>
    
    <!-- External Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Hand-Drawn Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <nav aria-label="Main Navigation">
        <div class="logo" role="button" onclick="location.reload()" aria-label="Suggesto Logo">SUGGESTO</div>
        <div class="nav-search">
            <div class="search-box">
                <i data-lucide="search" aria-hidden="true" style="width: 20px;"></i>
                <input type="text" id="query-input" placeholder="Search for movies to sketch..." autocomplete="off">
            </div>
        </div>
        <div class="nav-links">
            <button class="nav-link active" onclick="switchTab('movies', this)">Movies</button>
            <button class="nav-link" onclick="switchTab('songs', this)">Music</button>
            <button class="nav-link" onclick="switchTab('courses', this)">Learning</button>
        </div>
    </nav>

    <main id="main-content">
        <!-- Detail View (The Post-it) -->
        <section id="detail-view" class="detail-view" aria-labelledby="det-title">
            <div class="detail-flex">
                <header class="detail-img">
                    <img src="" id="det-img" alt="Movie Poster">
                </header>
                <article class="detail-content">
                    <p class="detail-tagline" id="det-tagline"></p>
                    <h1 class="detail-title" id="det-title"></h1>
                    <div class="detail-meta" id="det-meta"></div>
                    <p class="detail-desc" id="det-desc"></p>
                </article>
            </div>
        </section>

        <h2 class="grid-header" id="grid-header">Daily Discoveries</h2>

        <!-- Content Grid -->
        <section id="grid-container" aria-live="polite">
            <div class="discovery-grid" id="discovery-results">
                <!-- Cards appear here dynamically -->
            </div>
        </section>
    </main>

    <!-- Application Logic -->
    <script src="/static/js/app.js"></script>
</body>
</html>
