<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggesto — Cinematic AI Discovery</title>
    <meta name="description" content="Premium AI-powered movie recommendations. Explore 87,000+ films with cinematic precision.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ── Design Tokens ─────────────────────────────────── */
        :root {
            --bg-deep: #050508;
            --bg-surface: rgba(15, 15, 25, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --bg-glass-heavy: rgba(255, 255, 255, 0.08);
            
            --accent: #8b5cf6;
            --accent-light: #c084fc;
            --secondary: #06b6d4;
            
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --border: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(139, 92, 246, 0.3);
            
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
            
            --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.15);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        /* ── Reset ─────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Ambient Mesh Background ──────────────────────── */
        .ambient-canvas {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 20% 20%, rgba(139, 92, 246, 0.15), transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.15), transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.05), transparent 60%);
            filter: blur(80px);
            animation: bgMove 20s infinite alternate ease-in-out;
        }
        @keyframes bgMove {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(2%, 2%); }
        }

        /* ── Layout ────────────────────────────────────────── */
        .container {
            max-width: 1400px; margin: 0 auto; padding: 0 40px;
            position: relative; z-index: 1;
        }

        /* ── Navbar ────────────────────────────────────────── */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 0;
        }
        .logo {
            font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800;
            letter-spacing: -0.04em; display: flex; align-items: center; gap: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo span { color: var(--accent); -webkit-text-fill-color: var(--accent); }

        /* ── Hero Section ──────────────────────────────────── */
        .hero {
            text-align: center; padding: 60px 0 40px;
            display: flex; flex-direction: column; align-items: center;
        }
        .hero h1 {
            font-family: var(--font-heading); font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800; letter-spacing: -0.05em; line-height: 1;
            margin-bottom: 20px;
        }
        .hero p {
            color: var(--text-secondary); font-size: 1.1rem; max-width: 600px;
            margin-bottom: 40px;
        }

        /* ── Search Experience ─────────────────────────────── */
        .search-container {
            width: 100%; max-width: 700px; position: relative;
        }
        .search-outer {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 8px; display: flex; align-items: center;
            transition: var(--transition);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .search-outer:focus-within {
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }
        .search-icon {
            margin-left: 20px; color: var(--text-muted); font-size: 1.2rem;
        }
        #search-input {
            background: transparent; border: none; outline: none;
            color: #fff; width: 100%; padding: 12px 16px;
            font-family: var(--font-main); font-size: 1.1rem;
        }
        #search-input::placeholder { color: var(--text-muted); }

        .search-btn {
            background: var(--accent); color: #fff; border: none;
            padding: 12px 28px; border-radius: var(--radius-full);
            font-weight: 600; cursor: pointer; transition: var(--transition);
            font-family: var(--font-main);
        }
        .search-btn:hover { background: var(--accent-light); transform: scale(1.05); }

        /* ── Movie Detail Hero ────────────────────────────── */
        #hero-movie-container {
            margin-top: 60px; display: none;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .movie-hero {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden; display: flex;
            backdrop-filter: blur(30px);
            padding: 40px; gap: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .movie-hero-poster {
            width: 260px; aspect-ratio: 2/3; border-radius: var(--radius-md);
            object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex-shrink: 0;
        }
        .movie-hero-content { flex: 1; }
        .hero-title { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
        .hero-meta { display: flex; gap: 20px; color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 24px; }
        .hero-genres { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
        .tag {
            background: var(--bg-glass-heavy); border: 1px solid var(--border);
            padding: 4px 14px; border-radius: var(--radius-full); font-size: 0.8rem;
            color: var(--text-secondary); font-weight: 500;
        }
        .hero-overview { font-size: 1.05rem; line-height: 1.6; color: var(--text-secondary); margin-bottom: 30px; }
        .hero-stats { display: flex; gap: 40px; }
        .stat-item .label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
        .stat-item .value { font-size: 1.4rem; font-weight: 700; color: var(--accent-light); }

        /* ── Recommendations Grid ──────────────────────────── */
        .section-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin: 80px 0 30px;
        }
        .section-header h2 { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 700; }
        .section-header p { color: var(--text-muted); font-size: 0.9rem; }

        .movies-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px; margin-bottom: 100px;
        }

        .movie-card {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); overflow: hidden; cursor: pointer;
            transition: var(--transition); position: relative;
            animation: fadeIn 0.8s ease both;
        }
        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
        }
        .card-poster-wrapper {
            position: relative; aspect-ratio: 2/3; overflow: hidden;
        }
        .card-poster { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .movie-card:hover .card-poster { transform: scale(1.1); }

        .card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; opacity: 0.9;
        }
        .card-match {
            position: absolute; top: 12px; right: 12px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 4px 10px; border-radius: var(--radius-sm);
            font-size: 0.75rem; font-weight: 700; color: var(--accent-light);
            border: 1px solid var(--border-glow);
        }
        .card-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .card-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); }

        /* ── Animations ────────────────────────────────────── */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loader {
            width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; display: none;
        }
        .loader.active { display: block; }

        /* ── Responsive ────────────────────────────────────── */
        @media (max-width: 900px) {
            .movie-hero { flex-direction: column; padding: 25px; }
            .movie-hero-poster { width: 100%; max-width: 220px; align-self: center; }
            .container { padding: 0 20px; }
            .hero h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="ambient-canvas"></div>

    <div class="container">
        <!-- Navbar -->
        <nav>
            <div class="logo">Suggesto<span>AI</span></div>
            <div class="nav-links" style="display: flex; gap: 24px; color: var(--text-muted); font-size: 0.9rem;">
                <span>Discover</span>
                <span>Trending</span>
                <span>My List</span>
            </div>
        </nav>

        <!-- Hero / Search Section -->
        <section class="hero">
            <h1>Discover your next <span>obsession</span>.</h1>
            <p>Smart movie recommendations powered by advanced AI and relationship mapping across 87,000+ cinematic titles.</p>
            
            <div class="search-container">
                <div class="search-outer">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="What movie did you love lately?" autocomplete="off">
                    <div class="loader" id="search-loader"></div>
                    <button class="search-btn" id="search-btn">Search</button>
                </div>
            </div>
        </section>

        <!-- Movie Detail Hero -->
        <div id="hero-movie-container">
            <!-- Dynamic Content -->
        </div>

        <!-- content sections -->
        <div id="results-sections">
            <!-- Dynamic Results -->
        </div>
        
    </div>

    <script>
        // ── Config ───────────────────────────────────────────
        const TMDB_IMG_URL = 'https://image.tmdb.org/t/p/w780';
        const tmdbCache = {};

        // ── DOM Elements ─────────────────────────────────────
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const searchLoader = document.getElementById('search-loader');
        const heroContainer = document.getElementById('hero-movie-container');
        const resultsContainer = document.getElementById('results-sections');

        // ── Event Listeners ──────────────────────────────────
        searchBtn.addEventListener('click', () => performSearch());
        searchInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });

        async function performSearch() {
            const query = searchInput.value.trim();
            if (query.length < 2) return;

            searchLoader.classList.add('active');
            resultsContainer.innerHTML = '';
            heroContainer.style.display = 'none';

            try {
                const res = await fetch(`/api/v1/movies/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                renderSearchResults(data.results, query);
            } catch (err) {
                console.error(err);
            } finally {
                searchLoader.classList.remove('active');
            }
        }

        function renderSearchResults(results, query) {
            if (!results || results.length === 0) {
                resultsContainer.innerHTML = `<div style="text-align:center; padding: 100px; color: var(--text-muted);">No movies found for "${query}"</div>`;
                return;
            }

            resultsContainer.innerHTML = `
                <div class="section-header">
                    <h2>Found for "${query}"</h2>
                    <p>${results.length} titles identified</p>
                </div>
                <div class="movies-grid" id="search-grid"></div>
            `;

            const grid = document.getElementById('search-grid');
            results.forEach((movie, i) => {
                const card = createMovieCard(movie, i);
                card.onclick = () => selectMovie(movie);
                grid.appendChild(card);
                fetchTmdbDataForCard(movie.tmdbId, card);
            });
        }

        async function selectMovie(movie) {
            // Layout changes
            heroContainer.style.display = 'block';
            heroContainer.innerHTML = `
                <div class="movie-hero">
                    <img src="" class="movie-hero-poster" id="hero-poster" alt="">
                    <div class="movie-hero-content">
                        <h2 class="hero-title">${movie.title}</h2>
                        <div class="hero-meta">
                            <span>${movie.releaseYear || 'N/A'}</span>
                            <span id="hero-runtime"></span>
                        </div>
                        <div class="hero-genres">
                            ${(movie.genres || []).map(g => `<span class="tag">${g}</span>`).join('')}
                        </div>
                        <p class="hero-overview" id="hero-overview">Loading cinematic details...</p>
                        <div class="hero-stats">
                            <div class="stat-item"><span class="label">Audience</span><span class="value" id="hero-rating">--</span></div>
                            <div class="stat-item"><span class="label">Popularity</span><span class="value" id="hero-popularity">--</span></div>
                        </div>
                    </div>
                </div>
            `;
            
            window.scrollTo({ top: heroContainer.offsetTop - 100, behavior: 'smooth' });
            
            // Load TMDB Data for Hero
            const tmdbData = await fetchTmdbData(movie.tmdbId);
            if(tmdbData) {
                document.getElementById('hero-poster').src = tmdbData.poster_path ? TMDB_IMG_URL + tmdbData.poster_path : '';
                document.getElementById('hero-overview').textContent = tmdbData.overview || 'Description not available.';
                document.getElementById('hero-rating').textContent = (tmdbData.vote_average || 0).toFixed(1);
                document.getElementById('hero-popularity').textContent = Math.round(tmdbData.popularity || 0);
                document.getElementById('hero-runtime').textContent = tmdbData.runtime ? `${tmdbData.runtime} MIN` : '';
            }

            // Fetch Recommendations
            fetchRecommendations(movie.movieId);
        }

        async function fetchRecommendations(movieId) {
            try {
                const res = await fetch(`/api/v1/movies/recommend/${movieId}?mode=hybrid`);
                const data = await res.json();
                renderRecommendations(data.recommendations);
            } catch (err) {
                console.error(err);
            }
        }

        function renderRecommendations(recs) {
            const recSection = document.createElement('div');
            recSection.innerHTML = `
                <div class="section-header" style="margin-top: 40px;">
                    <h2>Similar Cinematic Journeys</h2>
                    <p>AI-mapped relationships</p>
                </div>
                <div class="movies-grid" id="rec-grid"></div>
            `;
            resultsContainer.innerHTML = '';
            resultsContainer.appendChild(recSection);

            const grid = document.getElementById('rec-grid');
            recs.forEach((movie, i) => {
                const card = createMovieCard(movie, i);
                card.onclick = () => selectMovie(movie);
                // Add match percentage
                if(movie.similarity) {
                    const match = Math.round(movie.similarity * 100);
                    const matchEl = document.createElement('div');
                    matchEl.className = 'card-match';
                    matchEl.textContent = `${match}% Match`;
                    card.querySelector('.card-poster-wrapper').appendChild(matchEl);
                }
                grid.appendChild(card);
                fetchTmdbDataForCard(movie.tmdbId, card);
            });
        }

        // ── Helper UI Functions ────────────────────────────
        function createMovieCard(movie, delayIndex) {
            const div = document.createElement('div');
            div.className = 'movie-card';
            div.style.animationDelay = `${delayIndex * 0.08}s`;
            div.innerHTML = `
                <div class="card-poster-wrapper">
                    <img src="" class="card-poster" alt="${movie.title}" id="poster-${movie.tmdbId}">
                    <div class="card-overlay">
                        <div class="card-title">${movie.title}</div>
                        <div class="card-meta">
                            <span>${movie.releaseYear || ''}</span>
                            <span id="card-rate-${movie.tmdbId}"></span>
                        </div>
                    </div>
                </div>
            `;
            return div;
        }

        async function fetchTmdbData(tmdbId) {
            if(!tmdbId) return null;
            if(tmdbCache[tmdbId]) return tmdbCache[tmdbId];
            try {
                const res = await fetch(`/api/v1/tmdb/movie/${tmdbId}`);
                if(!res.ok) return null;
                const data = await res.json();
                tmdbCache[tmdbId] = data;
                return data;
            } catch { return null; }
        }

        async function fetchTmdbDataForCard(tmdbId, cardEl) {
            const data = await fetchTmdbData(tmdbId);
            if(data) {
                const img = cardEl.querySelector('.card-poster');
                img.src = data.poster_path ? TMDB_IMG_URL + data.poster_path : '';
                const rate = cardEl.querySelector(`#card-rate-${tmdbId}`);
                if(rate) rate.textContent = `⭐ ${data.vote_average.toFixed(1)}`;
            }
        }
    </script>
</body>
</html>
