<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggesto: The Cinema Sketchbook 🎬</title>
    
    <!-- External Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    
    <!-- Hand-Drawn Styles -->
    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <link rel="stylesheet" href="/static/css/mascot.css?v=1">
</head>
<body>

    <nav aria-label="Main Navigation">
        <div class="logo" role="button" onclick="location.reload()" aria-label="Suggesto Logo">Suggesto: Sketchbook</div>
        
        <!-- 'Sketchy' The Mascot (True 3D Edition - Now on Navbar) -->
        <div id="sketchy-mascot" class="mascot-container">
            <div class="sketchy-bubble" id="sketchy-text">Searching for a masterpiece? 🖋️</div>
            <model-viewer
                id="sketchy-3d"
                src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
                alt="A cute 3D Robot Mascot"
                loading="lazy"
                power-preference="low-power"
                auto-rotate
                rotation-speed="0.5"
                shadow-intensity="1"
                environment-image="neutral"
                exposure="1"
                autoplay
                animation-name="Dance"
                interaction-prompt="none"
                camera-controls
                disable-zoom
                onclick="triggerSketchy3D()">
            </model-viewer>
        </div>

        <div class="nav-search">
            <div class="search-box">
                <i data-lucide="search" aria-hidden="true" style="width: 20px;"></i>
                <input type="text" id="query-input" placeholder="Sketch a movie title..." autocomplete="off">
            </div>
        </div>
        <div class="nav-links">
            <button class="nav-link active" onclick="switchTab('movies', this)">Cinema Log</button>
    <button class="nav-link" onclick="switchTab('songs', this)">Playlist Scribbles</button>
        </div>
    </nav>

    <main id="main-content">
        <!-- Spotlight / Billboard (Billboard Sketch) -->
        <section id="spotlight-section" class="spotlight-section">
            <div id="spotlight-container"></div>
        </section>

        <!-- Genre / Quick-Pills Bar -->
        <section class="pill-bar-container">
            <div id="genre-pills" class="genre-pills">
                <!-- Pills populated dynamically -->
            </div>
        </section>

        <!-- Detail View (The Post-it) -->
        <section id="detail-view" class="detail-view" aria-labelledby="det-title">
            <div class="detail-flex">
                <div class="detail-img" id="det-img-container">
                    <img src="" alt="Movie Poster">
                </div>
                <article class="detail-content">
                    <p class="detail-tagline" id="det-tagline"></p>
                    <h1 class="detail-title" id="det-title"></h1>
                    <div class="detail-meta" id="det-meta"></div>
                    <p class="detail-desc" id="det-desc"></p>
                    <div class="detail-actions">
                        <a id="det-play-link" target="_blank" class="play-btn">
                            <i data-lucide="play-circle"></i>
                            <span id="det-play-text">Sketching Link...</span>
                        </a>
                    </div>
                </article>
            </div>
        </section>

        <div id="content-sections">
            <div class="content-row">
                <h2 class="grid-header" id="grid-header">Trending Sketches</h2>
                <!-- Content Grid -->
                <section id="grid-container" aria-live="polite">
                    <div class="discovery-grid" id="discovery-results">
                        <!-- Cards appear here dynamically -->
                    </div>
                </section>
            </div>
        </div>
    </main>



    <!-- Application Logic -->
    <script src="/static/js/app.js?v=2"></script>
</body>
</html>
