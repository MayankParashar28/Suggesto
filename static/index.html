<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineDiscover — AI Movie Recommendations</title>
    <meta name="description" content="Discover your next favorite movie with AI-powered content-based and collaborative filtering recommendations from 87,000+ films.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Tokens ─────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255,255,255,0.04);
            --bg-card-hover: rgba(255,255,255,0.08);
            --bg-glass: rgba(255,255,255,0.06);
            --border-subtle: rgba(255,255,255,0.08);
            --border-accent: rgba(139,92,246,0.3);
            --text-primary: #f0f0f5;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #8b5cf6;
            --accent-glow: rgba(139,92,246,0.25);
            --accent-secondary: #06b6d4;
            --gradient-hero: linear-gradient(135deg, #8b5cf6 0%, #06b6d4 50%, #8b5cf6 100%);
            --gradient-card: linear-gradient(145deg, rgba(139,92,246,0.08), rgba(6,182,212,0.05));
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-glow: 0 0 40px var(--accent-glow);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ── Ambient Background ─────────────────────────────── */
        .ambient-bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            overflow: hidden;
        }
        .ambient-bg .orb {
            position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }
        .ambient-bg .orb:nth-child(1) { width: 500px; height: 500px; background: #8b5cf6; top: -10%; left: -5%; animation-delay: 0s; }
        .ambient-bg .orb:nth-child(2) { width: 400px; height: 400px; background: #06b6d4; top: 50%; right: -10%; animation-delay: -7s; }
        .ambient-bg .orb:nth-child(3) { width: 350px; height: 350px; background: #ec4899; bottom: -10%; left: 30%; animation-delay: -14s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        /* ── Layout ────────────────────────────────────────── */
        .container {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
        }

        /* ── Header ────────────────────────────────────────── */
        header {
            padding: 32px 0 16px;
            text-align: center;
        }
        .logo {
            font-size: 2rem; font-weight: 800; letter-spacing: -0.03em;
            background: var(--gradient-hero); background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease-in-out infinite;
        }
        .logo span { font-weight: 300; opacity: 0.7; }
        .tagline { color: var(--text-muted); font-size: 0.9rem; margin-top: 4px; font-weight: 300; }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ── Search Section ────────────────────────────────── */
        .search-section { padding: 24px 0 32px; }

        .search-wrapper {
            position: relative; max-width: 640px; margin: 0 auto;
        }
        .search-icon {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 1.1rem; pointer-events: none;
            transition: var(--transition);
        }
        #search-input {
            width: 100%; padding: 16px 20px 16px 52px;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            color: var(--text-primary); font-size: 1rem; font-family: var(--font);
            outline: none; transition: var(--transition);
            backdrop-filter: blur(20px);
        }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: var(--shadow-glow);
        }
        #search-input::placeholder { color: var(--text-muted); }

        .search-spinner {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; border: 2px solid var(--border-subtle);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        .search-spinner.active { display: block; }

        @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

        /* ── Search Results Dropdown ───────────────────────── */
        .search-results {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(40px);
            overflow: hidden; z-index: 100;
            box-shadow: var(--shadow-md);
            display: none;
            max-height: 420px; overflow-y: auto;
        }
        .search-results.visible { display: block; animation: fadeSlideIn 0.2s ease; }

        .search-result-item {
            padding: 14px 20px; cursor: pointer;
            border-bottom: 1px solid var(--border-subtle);
            transition: var(--transition); display: flex; align-items: center; gap: 14px;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: var(--bg-card-hover); }

        .result-poster-sm {
            width: 40px; height: 56px; border-radius: 6px; object-fit: cover;
            background: var(--bg-card); flex-shrink: 0;
        }
        .result-info { flex: 1; min-width: 0; }
        .result-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .result-meta { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }
        .result-meta .genre-tag-sm {
            display: inline-block; padding: 1px 6px; border-radius: 4px;
            background: rgba(139,92,246,0.15); color: var(--accent); font-size: 0.7rem;
            margin-left: 4px;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Controls Bar ──────────────────────────────────── */
        .controls-bar {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 16px 0; flex-wrap: wrap;
        }
        .mode-btn {
            padding: 8px 20px; border-radius: 100px;
            background: var(--bg-glass); border: 1px solid var(--border-subtle);
            color: var(--text-secondary); font-size: 0.85rem; font-family: var(--font);
            font-weight: 500; cursor: pointer; transition: var(--transition);
        }
        .mode-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .mode-btn.active {
            background: var(--accent); border-color: var(--accent);
            color: #fff; box-shadow: 0 4px 20px var(--accent-glow);
        }

        /* ── Selected Movie Hero ───────────────────────────── */
        .hero-movie {
            display: none; padding: 32px 0 24px;
            animation: fadeSlideIn 0.4s ease;
        }
        .hero-movie.visible { display: block; }

        .hero-card {
            display: flex; gap: 28px; padding: 28px;
            background: var(--gradient-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            backdrop-filter: blur(20px);
        }
        .hero-poster {
            width: 160px; height: 240px; border-radius: var(--radius-md);
            object-fit: cover; flex-shrink: 0;
            box-shadow: var(--shadow-md);
        }
        .hero-poster-placeholder {
            width: 160px; height: 240px; border-radius: var(--radius-md);
            background: linear-gradient(145deg, var(--bg-card), var(--bg-secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; flex-shrink: 0;
        }
        .hero-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .hero-title { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
        .hero-year { color: var(--text-muted); font-size: 1rem; margin-top: 6px; }
        .hero-genres { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
        .genre-pill {
            padding: 5px 14px; border-radius: 100px; font-size: 0.8rem; font-weight: 500;
            background: rgba(139,92,246,0.12); color: var(--accent);
            border: 1px solid rgba(139,92,246,0.2);
        }

        /* ── Recommendations Grid ──────────────────────────── */
        .recs-section { padding: 8px 0 60px; }
        .recs-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .recs-title { font-size: 1.3rem; font-weight: 700; }
        .recs-count { color: var(--text-muted); font-size: 0.85rem; }

        .recs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .rec-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden; cursor: pointer;
            transition: var(--transition);
            animation: fadeUp 0.4s ease both;
        }
        .rec-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-accent);
            box-shadow: var(--shadow-glow);
        }

        .rec-poster {
            width: 100%; aspect-ratio: 2/3; object-fit: cover;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
        }
        .rec-poster-placeholder {
            width: 100%; aspect-ratio: 2/3;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
        }
        .rec-body { padding: 14px; }
        .rec-title {
            font-size: 0.9rem; font-weight: 600; line-height: 1.3;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .rec-meta-row {
            display: flex; align-items: center; gap: 8px; margin-top: 4px;
        }
        .rec-year { color: var(--text-muted); font-size: 0.8rem; }
        .rec-rating {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 0.75rem; font-weight: 600; color: #fbbf24;
        }
        .rec-votes { color: var(--text-muted); font-size: 0.7rem; }

        .rec-overview {
            font-size: 0.75rem; color: var(--text-secondary); line-height: 1.4;
            margin-top: 8px;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .rec-match-bar { margin-top: 10px; }
        .rec-match-label {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.7rem; margin-bottom: 4px;
        }
        .rec-match-label .label { color: var(--text-muted); }
        .rec-match-label .pct { font-weight: 700; }
        .pct-high { color: #22c55e; }
        .pct-med  { color: #eab308; }
        .pct-low  { color: #ef4444; }
        .match-track {
            height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden;
        }
        .match-fill {
            height: 100%; border-radius: 2px; transition: width 0.6s ease;
        }
        .fill-high { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .fill-med  { background: linear-gradient(90deg, #eab308, #facc15); }
        .fill-low  { background: linear-gradient(90deg, #ef4444, #f87171); }

        .rec-genres-row {
            display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
        }
        .rec-genre-tag {
            font-size: 0.65rem; padding: 2px 8px; border-radius: 100px;
            background: rgba(255,255,255,0.06); color: var(--text-secondary);
        }

        .hero-overview {
            font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5;
            margin-top: 14px; max-width: 600px;
        }
        .hero-rating {
            display: inline-flex; align-items: center; gap: 6px;
            margin-top: 12px; font-size: 0.9rem; color: #fbbf24; font-weight: 600;
        }
        .hero-rating .votes { color: var(--text-muted); font-weight: 400; font-size: 0.8rem; }
        .hero-tagline {
            font-size: 1rem; color: var(--accent-secondary); font-style: italic;
            margin-top: 10px; font-weight: 400; opacity: 0.85;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Empty / Loading States ────────────────────────── */
        .empty-state {
            text-align: center; padding: 80px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h2 { font-size: 1.3rem; color: var(--text-secondary); font-weight: 600; }
        .empty-state p { font-size: 0.9rem; margin-top: 8px; max-width: 400px; margin-inline: auto; }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
            border-radius: var(--radius-md);
        }
        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Responsive ────────────────────────────────────── */
        @media (max-width: 640px) {
            .hero-card { flex-direction: column; align-items: center; text-align: center; }
            .hero-genres { justify-content: center; }
            .hero-poster, .hero-poster-placeholder { width: 120px; height: 180px; }
            .hero-title { font-size: 1.4rem; }
            .recs-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
            .logo { font-size: 1.5rem; }
        }

        /* ── Scrollbar ─────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

<div class="ambient-bg">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
</div>

<div class="container">
    <!-- Header -->
    <header>
        <div class="logo">CineDiscover <span>AI</span></div>
        <p class="tagline">87,000+ movies · Powered by ML content analysis</p>
    </header>

    <!-- Search -->
    <section class="search-section">
        <div class="search-wrapper" id="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Type a movie name and press Enter…" autocomplete="off" spellcheck="false">
            <div class="search-spinner" id="search-spinner"></div>
        </div>
    </section>

    <!-- Selected Movie Hero -->
    <section class="hero-movie" id="hero-movie"></section>

    <!-- Recommendations -->
    <section class="recs-section" id="recs-section" style="display:none;"></section>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state">
        <div class="icon">🎬</div>
        <h2>Discover Your Next Favorite Film</h2>
        <p>Search for any movie to get AI-powered recommendations based on content analysis of 87,000+ films.</p>
    </div>
</div>

<script>
    const TMDB_IMG = 'https://image.tmdb.org/t/p/w342';
    const TMDB_API = 'https://api.themoviedb.org/3';
    const TMDB_KEY = '1061c40a51dd2b2ae1eeaae191078c91';

    let currentMovieId = null;
    const tmdbCache = {};   // tmdbId → { poster, overview, rating, votes }

    // ── DOM Refs ───────────────────────────────────────────
    const searchInput    = document.getElementById('search-input');
    const searchSpinner  = document.getElementById('search-spinner');
    const heroSection    = document.getElementById('hero-movie');
    const recsSection    = document.getElementById('recs-section');
    const emptyState     = document.getElementById('empty-state');

    // ── Search on Enter ────────────────────────────────────
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const q = searchInput.value.trim();
            if (q.length < 2) return;
            searchSpinner.classList.add('active');
            fetchSearch(q);
        }
    });

    async function fetchSearch(query) {
        // Reset view
        heroSection.classList.remove('visible');
        heroSection.innerHTML = '';
        emptyState.style.display = 'none';

        // Show skeleton loading
        recsSection.style.display = 'block';
        recsSection.innerHTML = `
            <div class="recs-header">
                <span class="recs-title">Searching for "${escHtml(query)}"…</span>
            </div>
            <div class="recs-grid">
                ${Array(6).fill('<div class="rec-card"><div class="skeleton" style="aspect-ratio:2/3"></div><div style="padding:14px"><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:12px;width:40%;margin-top:8px"></div></div></div>').join('')}
            </div>
        `;

        try {
            const res = await fetch(`/api/v1/movies/search?q=${encodeURIComponent(query)}`);
            const data = await res.json();
            renderMovieCards(data.results || [], query);
        } catch (err) {
            console.error('Search error:', err);
            recsSection.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h2>Something went wrong</h2></div>';
        } finally {
            searchSpinner.classList.remove('active');
        }
    }

    // ── Render Search Results as Cards ──────────────────────
    function renderMovieCards(results, query) {
        if (!results.length) {
            recsSection.innerHTML = `<div class="empty-state"><div class="icon">😕</div><h2>No movies found for "${escHtml(query)}"</h2><p>Try a different search term.</p></div>`;
            return;
        }

        recsSection.innerHTML = `
            <div class="recs-header">
                <span class="recs-title">Movies matching "${escHtml(query)}"</span>
                <span class="recs-count">${results.length} results</span>
            </div>
            <div class="recs-grid" id="recs-grid"></div>
        `;

        const grid = document.getElementById('recs-grid');
        results.forEach((r, i) => {
            const card = document.createElement('div');
            card.className = 'rec-card';
            card.style.animationDelay = `${i * 0.05}s`;
            card.onclick = () => selectMovie(r);
            card.innerHTML = `
                <div class="rec-poster-placeholder" id="rec-poster-${r.tmdbId}">🎬</div>
                <div class="rec-body">
                    <div class="rec-title" title="${escHtml(r.title)}">${escHtml(r.title)}</div>
                    <div class="rec-meta-row">
                        <span class="rec-year">${r.releaseYear || ''}</span>
                        <span class="rec-rating" id="rating-${r.tmdbId}"></span>
                    </div>
                    <div class="rec-overview" id="overview-${r.tmdbId}"></div>
                    <div class="rec-genres-row">
                        ${(r.genres || []).slice(0, 3).map(g => `<span class="rec-genre-tag">${g}</span>`).join('')}
                    </div>
                </div>
            `;
            grid.appendChild(card);
            if (r.tmdbId > 0) loadTmdbData(r.tmdbId);
        });
    }

    // ── Select Movie → Show Recommendations ────────────────
    function selectMovie(movie) {
        currentMovieId = movie.movieId;
        searchInput.value = movie.title;
        emptyState.style.display = 'none';

        // Render hero card
        heroSection.innerHTML = `
            <div class="hero-card">
                <div class="hero-poster-placeholder" id="hero-poster-box">🎬</div>
                <div class="hero-info">
                    <div class="hero-title">${escHtml(movie.title)}</div>
                    <div class="hero-year">${movie.releaseYear || 'Unknown year'}</div>
                    <div class="hero-genres">
                        ${(movie.genres || []).map(g => `<span class="genre-pill">${g}</span>`).join('')}
                    </div>
                    <div class="hero-tagline" id="hero-tagline"></div>
                    <div class="hero-rating" id="hero-rating"></div>
                    <div class="hero-overview" id="hero-overview"></div>
                </div>
            </div>
        `;
        heroSection.classList.add('visible');
        if (movie.tmdbId > 0) loadHeroData(movie.tmdbId);

        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Fetch recommendations
        fetchRecommendations();
    }

    // ── Recommendations ────────────────────────────────────
    async function fetchRecommendations() {
        recsSection.style.display = 'block';
        recsSection.innerHTML = `
            <div class="recs-header">
                <span class="recs-title">Finding similar movies…</span>
            </div>
            <div class="recs-grid">
                ${Array(6).fill('<div class="rec-card"><div class="skeleton" style="aspect-ratio:2/3"></div><div style="padding:14px"><div class="skeleton" style="height:16px;width:80%"></div><div class="skeleton" style="height:12px;width:40%;margin-top:8px"></div></div></div>').join('')}
            </div>
        `;

        try {
            const res = await fetch(`/api/v1/movies/recommend/${currentMovieId}?mode=content`);
            if (!res.ok) {
                const err = await res.json();
                recsSection.innerHTML = `<div class="empty-state"><div class="icon">😕</div><h2>No recommendations found</h2><p>${err.detail || 'Try a different movie.'}</p></div>`;
                return;
            }
            const data = await res.json();
            renderRecommendations(data.recommendations || []);
        } catch (err) {
            console.error('Recommend error:', err);
            recsSection.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><h2>Something went wrong</h2></div>';
        }
    }

    function renderRecommendations(recs) {
        recsSection.innerHTML = `
            <div class="recs-header">
                <span class="recs-title">You might also like</span>
                <span class="recs-count">${recs.length} recommendations</span>
            </div>
            <div class="recs-grid" id="recs-grid"></div>
        `;

        const grid = document.getElementById('recs-grid');
        recs.forEach((r, i) => {
            const simPct = Math.round((r.similarity || 0) * 100);
            const pctClass = simPct >= 60 ? 'pct-high' : simPct >= 40 ? 'pct-med' : 'pct-low';
            const fillClass = simPct >= 60 ? 'fill-high' : simPct >= 40 ? 'fill-med' : 'fill-low';

            const card = document.createElement('div');
            card.className = 'rec-card';
            card.style.animationDelay = `${i * 0.05}s`;
            card.onclick = () => selectMovie(r);
            card.innerHTML = `
                <div class="rec-poster-placeholder" id="rec-poster-${r.tmdbId}">🎬</div>
                <div class="rec-body">
                    <div class="rec-title" title="${escHtml(r.title)}">${escHtml(r.title)}</div>
                    <div class="rec-meta-row">
                        <span class="rec-year">${r.releaseYear || ''}</span>
                        <span class="rec-rating" id="rating-${r.tmdbId}"></span>
                    </div>
                    <div class="rec-overview" id="overview-${r.tmdbId}"></div>
                    <div class="rec-match-bar">
                        <div class="rec-match-label">
                            <span class="label">Match</span>
                            <span class="pct ${pctClass}">${simPct}%</span>
                        </div>
                        <div class="match-track">
                            <div class="match-fill ${fillClass}" style="width:${simPct}%"></div>
                        </div>
                    </div>
                    <div class="rec-genres-row">
                        ${(r.genres || []).slice(0, 3).map(g => `<span class="rec-genre-tag">${g}</span>`).join('')}
                    </div>
                </div>
            `;
            grid.appendChild(card);
            if (r.tmdbId > 0) loadTmdbData(r.tmdbId);
        });
    }

    // ── TMDB Data Loading ──────────────────────────────────
    async function fetchTmdbData(tmdbId) {
        if (tmdbCache[tmdbId] !== undefined) return tmdbCache[tmdbId];
        if (!TMDB_KEY) { tmdbCache[tmdbId] = null; return null; }
        try {
            const res = await fetch(`${TMDB_API}/movie/${tmdbId}?api_key=${TMDB_KEY}`);
            const data = await res.json();
            const info = {
                poster: data.poster_path ? `${TMDB_IMG}${data.poster_path}` : null,
                overview: data.overview || '',
                tagline: data.tagline || '',
                rating: data.vote_average || 0,
                votes: data.vote_count || 0,
            };
            tmdbCache[tmdbId] = info;
            return info;
        } catch { tmdbCache[tmdbId] = null; return null; }
    }

    async function loadHeroData(tmdbId) {
        const info = await fetchTmdbData(tmdbId);
        if (!info) return;
        // Poster
        const posterEl = document.getElementById('hero-poster-box');
        if (posterEl && info.poster) {
            const img = document.createElement('img');
            img.src = info.poster; img.alt = ''; img.className = 'hero-poster';
            posterEl.replaceWith(img);
        }
        // Rating
        const ratingEl = document.getElementById('hero-rating');
        if (ratingEl && info.rating) {
            ratingEl.innerHTML = `⭐ ${info.rating.toFixed(1)}/10 <span class="votes">(${info.votes.toLocaleString()} votes)</span>`;
        }
        // Overview
        const overviewEl = document.getElementById('hero-overview');
        if (overviewEl && info.overview) {
            overviewEl.textContent = info.overview;
        }
    }

    async function loadTmdbData(tmdbId) {
        const info = await fetchTmdbData(tmdbId);
        if (!info) return;
        // Poster
        const posterEl = document.getElementById(`rec-poster-${tmdbId}`);
        if (posterEl && info.poster) {
            const img = document.createElement('img');
            img.src = info.poster; img.alt = ''; img.className = 'rec-poster';
            posterEl.replaceWith(img);
        }
        // Rating
        const ratingEl = document.getElementById(`rating-${tmdbId}`);
        if (ratingEl && info.rating) {
            ratingEl.innerHTML = `⭐ ${info.rating.toFixed(1)} <span class="rec-votes">(${info.votes.toLocaleString()})</span>`;
        }
        // Overview
        const overviewEl = document.getElementById(`overview-${tmdbId}`);
        if (overviewEl && info.overview) {
            overviewEl.textContent = info.overview;
        }
    }

    // ── Utilities ──────────────────────────────────────────
    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
    }

    // Focus search on load
    searchInput.focus();
</script>
